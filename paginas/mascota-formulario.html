<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario Mascota | Veterinaria Patitas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/estilos.css">
</head>
<body>
    <div class="container main-content">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card card-custom p-4">
                    <h1 class="section-title mb-2">Formulario de Mascota</h1>
                    <p class="section-subtitle mb-4">Registra o edita la información del animal.</p>

                    <form id="formMascota">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Nombre</label>
                                <input type="text" id="nombre" class="form-control">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Especie</label>
                                <select id="especie" class="form-select">
                                    <option value="">Seleccione</option>
                                    <option value="Perro">Perro</option>
                                    <option value="Gato">Gato</option>
                                    <option value="Ganado">Ganado</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Raza</label>
                                <input type="text" id="raza" class="form-control">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Edad</label>
                                <input type="number" id="edad" class="form-control">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Sexo</label>
                                <select id="sexo" class="form-select">
                                    <option value="">Seleccione</option>
                                    <option value="Macho">Macho</option>
                                    <option value="Hembra">Hembra</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Peso</label>
                                <input type="number" id="peso" class="form-control">
                            </div>
                            <div class="col-md-12">
                                <label class="form-label">Propietario</label>
                                <input type="text" id="propietario" class="form-control">
                            </div>
                            <div class="col-md-12">
                                <label class="form-label">Observaciones</label>
                                <textarea id="observaciones" class="form-control" rows="3"></textarea>
                            </div>
                        </div>

                        <div id="camposGanado" class="row g-3 mt-2 oculto">
                            <div class="col-md-4">
                                <label class="form-label">Número de identificación</label>
                                <input type="text" id="identificacion" class="form-control">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Finca o lote</label>
                                <input type="text" id="finca" class="form-control">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Estado sanitario</label>
                                <input type="text" id="estadoSanitario" class="form-control">
                            </div>
                        </div>

                        <div class="mt-4 d-flex gap-2">
                            <button type="submit" class="btn btn-principal">Guardar</button>
                            <a href="mascotas.html" class="btn btn-outline-custom">Cancelar</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/validaciones.js"></script>
    <script src="../js/mascotas.js"></script>
</body>
</html>
