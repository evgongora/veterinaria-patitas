<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Animal - Veterinaria Patitas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/estilos.css">
</head>
<body>
    <div class="app-layout">
        <header class="app-header">
            <a href="panel.html" class="brand"><span class="paw">🐾</span><span>Veterinaria Patitas</span></a>
            <div class="user-area">
                <div class="user-info"><div class="name">Juan Pérez</div><div class="role">Cliente</div></div>
                <a href="login.html" class="btn-logout">→ Cerrar Sesión</a>
            </div>
        </header>
        <div class="app-body">
            <aside class="app-sidebar">
                <a href="panel.html" class="nav-item"><span class="icon">🏠</span> Dashboard</a>
                <a href="mascotas.html" class="nav-item active"><span class="icon">🐾</span> Mis Animales</a>
                <a href="cita-formulario.html" class="nav-item"><span class="icon">📅</span> Agendar Cita</a>
                <a href="historial-clinico.html" class="nav-item"><span class="icon">📋</span> Historial Clínico</a>
                <a href="facturas.html" class="nav-item"><span class="icon">🧾</span> Facturas</a>
            </aside>
            <main class="app-content">
                <div class="d-flex flex-wrap align-items-center justify-content-between gap-3 mb-4">
                    <div>
                        <h1 class="h3 fw-bold mb-1">Registrar Animal</h1>
                        <p class="text-muted mb-0">Agrega una nueva mascota a tu cuenta</p>
                    </div>
                </div>

                <div class="card border-0 shadow-sm">
                    <div class="card-body p-4">
                        <form id="formMascota">
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label">Nombre</label>
                                    <input type="text" id="nombre" class="form-control">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Especie</label>
                                    <select id="especie" class="form-select">
                                        <option value="">Seleccione</option>
                                        <option value="Perro">Perro</option>
                                        <option value="Gato">Gato</option>
                                        <option value="Ganado">Ganado</option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Raza</label>
                                    <input type="text" id="raza" class="form-control">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Edad</label>
                                    <input type="number" id="edad" class="form-control">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Sexo</label>
                                    <select id="sexo" class="form-select">
                                        <option value="">Seleccione</option>
                                        <option value="Macho">Macho</option>
                                        <option value="Hembra">Hembra</option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Peso (kg)</label>
                                    <input type="number" id="peso" class="form-control">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Color</label>
                                    <input type="text" id="color" class="form-control">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Propietario</label>
                                    <input type="text" id="propietario" class="form-control" value="Juan Pérez">
                                </div>
                                <div class="col-12">
                                    <label class="form-label">Observaciones</label>
                                    <textarea id="observaciones" class="form-control" rows="3"></textarea>
                                </div>
                            </div>
                            <div class="mt-4 d-flex gap-2">
                                <button type="submit" class="btn btn-success">Guardar</button>
                                <a href="mascotas.html" class="btn btn-outline-secondary">Cancelar</a>
                            </div>
                        </form>
                    </div>
                </div>
            </main>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/validaciones.js"></script>
    <script src="../js/mascotas.js"></script>
</body>
</html>
