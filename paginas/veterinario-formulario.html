<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario Veterinario - Veterinaria Patitas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/estilos.css">
</head>
<body>
    <div class="app-layout admin-layout">
        <header class="app-header">
            <a href="panel-admin.html" class="brand"><span class="paw">🐾</span><span>Veterinaria Patitas</span></a>
            <div class="user-area">
                <div class="user-info"><div class="name">Admin Veterinaria</div><div class="role">Admin</div></div>
                <a href="login.html" class="btn-logout">→ Cerrar Sesión</a>
            </div>
        </header>
        <div class="app-body">
            <aside class="app-sidebar">
                <a href="panel-admin.html" class="nav-item"><span class="icon">🏠</span> Dashboard</a>
                <a href="gestion-usuarios.html" class="nav-item active"><span class="icon">👥</span> Gestión de Usuarios</a>
                <a href="citas-dia.html" class="nav-item"><span class="icon">📅</span> Citas del Día</a>
                <a href="inventario.html" class="nav-item"><span class="icon">📦</span> Inventario</a>
                <a href="reportes.html" class="nav-item"><span class="icon">📊</span> Reportes</a>
            </aside>
            <main class="app-content">
                <nav aria-label="breadcrumb"><ol class="breadcrumb"><li class="breadcrumb-item"><a href="veterinarios.html">Veterinarios</a></li><li class="breadcrumb-item active">Nuevo Veterinario</li></ol></nav>
                <h1 class="h3 fw-bold mb-1">Formulario de Veterinario</h1>
                <p class="text-muted mb-4">Crear o editar datos del veterinario</p>
                <div id="veterinario-form-alert" class="alert d-none" role="alert"></div>
                <div class="card border-0 shadow-sm">
                    <div class="card-body p-4">
                        <form id="veterinario-form" novalidate>
                            <div class="row g-3">
                                <div class="col-12 col-md-6"><label for="veterinario-nombre" class="form-label">Nombre completo</label><input type="text" class="form-control" id="veterinario-nombre" required><div id="veterinario-nombre-error" class="invalid-feedback"></div></div>
                                <div class="col-12 col-md-6"><label for="veterinario-cedula" class="form-label">Cédula</label><input type="text" class="form-control" id="veterinario-cedula" required><div id="veterinario-cedula-error" class="invalid-feedback"></div></div>
                                <div class="col-12 col-md-6"><label for="veterinario-especialidad" class="form-label">Especialidad</label><select class="form-select" id="veterinario-especialidad" required><option value="">Seleccione...</option><option value="General">Medicina General</option><option value="Cirugía">Cirugía</option><option value="Exóticos">Animales Exóticos</option><option value="Ganado">Medicina de Ganado</option></select><div id="veterinario-especialidad-error" class="invalid-feedback"></div></div>
                                <div class="col-12 col-md-6"><label for="veterinario-telefono" class="form-label">Teléfono</label><input type="tel" class="form-control" id="veterinario-telefono" required><div id="veterinario-telefono-error" class="invalid-feedback"></div></div>
                                <div class="col-12 col-md-6"><label for="veterinario-email" class="form-label">Correo electrónico</label><input type="email" class="form-control" id="veterinario-email" required><div id="veterinario-email-error" class="invalid-feedback"></div></div>
                            </div>
                            <div class="d-flex gap-2 mt-4"><button type="submit" class="btn btn-success">Guardar</button><a href="veterinarios.html" class="btn btn-outline-secondary">Cancelar</a></div>
                        </form>
                    </div>
                </div>
            </main>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/validaciones.js"></script>
    <script src="../js/veterinarios.js"></script>
    <script>document.addEventListener('DOMContentLoaded', () => Veterinarios.initFormulario());</script>
</body>
</html>
