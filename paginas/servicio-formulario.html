<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario Servicio - Veterinaria Patitas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/estilos.css">
</head>
<body>
    <div class="app-layout admin-layout">
        <header class="app-header">
            <a href="panel-admin.html" class="brand"><span class="paw">🐾</span><span>Veterinaria Patitas</span></a>
            <div class="user-area">
                <div class="user-info"><div class="name">Admin Veterinaria</div><div class="role">Admin</div></div>
                <a href="login.html" class="btn-logout">→ Cerrar Sesión</a>
            </div>
        </header>
        <div class="app-body">
            <aside class="app-sidebar">
                <a href="panel-admin.html" class="nav-item"><span class="icon">🏠</span> Dashboard</a>
                <a href="gestion-usuarios.html" class="nav-item"><span class="icon">👥</span> Gestión de Usuarios</a>
                <a href="citas-dia.html" class="nav-item"><span class="icon">📅</span> Citas del Día</a>
                <a href="servicios-admin.html" class="nav-item active"><span class="icon">🩺</span> Servicios</a>
                <a href="inventario.html" class="nav-item"><span class="icon">📦</span> Inventario</a>
                <a href="reportes.html" class="nav-item"><span class="icon">📊</span> Reportes</a>
            </aside>
            <main class="app-content">
                <nav aria-label="breadcrumb"><ol class="breadcrumb"><li class="breadcrumb-item"><a href="servicios-admin.html">Servicios</a></li><li class="breadcrumb-item active" id="breadcrumbAccion">Nuevo Servicio</li></ol></nav>
                <div class="d-flex align-items-center gap-3 mb-4">
                    <div class="rounded-circle d-flex align-items-center justify-content-center flex-shrink-0" style="width:56px;height:56px;background:#2E7D32;color:white;font-size:1.5rem;">🐾</div>
                    <div>
                        <h1 class="h3 fw-bold mb-1" id="tituloFormulario">Nuevo Servicio</h1>
                        <p class="text-muted mb-0" id="subtituloFormulario">Completa la información del servicio</p>
                    </div>
                </div>
                <div id="alertaServicio"></div>
                <div class="card border-0 shadow-sm">
                    <div class="card-body p-4">
                        <form id="formServicio">
                            <div class="row g-3">
                                <div class="col-12 col-md-6"><label for="nombre" class="form-label">Nombre</label><input type="text" class="form-control" id="nombre" placeholder="Ej Consulta general"></div>
                                <div class="col-12 col-md-6"><label for="estado" class="form-label">Estado</label><select class="form-select" id="estado"><option value="Activo" selected>Activo</option><option value="Inactivo">Inactivo</option></select></div>
                                <div class="col-12"><label for="descripcion" class="form-label">Descripción</label><textarea class="form-control" id="descripcion" rows="3" placeholder="Descripción breve del servicio"></textarea></div>
                                <div class="col-12 col-md-6"><label for="precio" class="form-label">Precio (₡)</label><input type="number" class="form-control" id="precio" min="0" placeholder="0 = Consultar"><div class="form-text">0 para "Consultar"</div></div>
                                <div class="col-12 col-md-6"><label for="duracionMin" class="form-label">Duración (min)</label><input type="number" class="form-control" id="duracionMin" min="1" placeholder="30"></div>
                                <div class="col-12"><label for="icono" class="form-label">Icono</label><select class="form-select" id="icono"><option value="🩺">🩺 Consulta</option><option value="💉">💉 Vacunas</option><option value="🛁">🛁 Baño</option><option value="🐾">🐾 Uñas</option><option value="💊">💊 Farmacia</option><option value="✂️">✂️ Grooming</option></select></div>
                            </div>
                            <div class="d-flex gap-2 mt-4"><button type="submit" class="btn btn-success">Guardar Servicio</button><a href="servicios-admin.html" class="btn btn-outline-secondary">Cancelar</a></div>
                        </form>
                    </div>
                </div>
            </main>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/validaciones.js"></script>
    <script src="../js/servicios.js"></script>
</body>
</html>
