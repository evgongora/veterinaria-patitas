<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Inventario Formulario | Veterinaria Patitas</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="../css/estilos.css" />
</head>

<body>
  <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom sticky-top">
    <div class="container-fluid px-3">
      <button class="btn btn-link text-dark me-2" type="button" data-bs-toggle="offcanvas" data-bs-target="#menuLateral">
        <span class="fs-4">≡</span>
      </button>

      <a class="navbar-brand fw-semibold d-flex align-items-center gap-2" href="panel.html">
        <span class="fs-5">🐾</span>
        <span style="color:#2E7D32;">Veterinaria Patitas</span>
      </a>

      <div class="ms-auto d-flex align-items-center gap-3">
        <div class="text-end">
          <div class="fw-semibold small" id="txtNombreUsuario">Usuario</div>
          <div class="text-muted small" id="txtRolUsuario">Cliente</div>
        </div>

        <a href="../index.html" class="btn btn-outline-secondary btn-sm d-flex align-items-center gap-2" id="btnCerrarSesion">
          <span>⎋</span>
          <span>Cerrar Sesion</span>
        </a>
      </div>
    </div>
  </nav>

  <div class="offcanvas offcanvas-start" tabindex="-1" id="menuLateral">
    <div class="offcanvas-header">
      <h5 class="offcanvas-title">Menu</h5>
      <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body">
      <div class="list-group">
        <a class="list-group-item list-group-item-action" href="panel.html">Dashboard</a>
        <a class="list-group-item list-group-item-action" href="servicios.html">Servicios</a>
        <a class="list-group-item list-group-item-action" href="facturas.html">Facturas</a>
        <a class="list-group-item list-group-item-action" href="pagos.html">Pagos</a>
        <a class="list-group-item list-group-item-action active" href="inventario.html">Inventario</a>
        <a class="list-group-item list-group-item-action" href="evaluacion.html">Evaluacion</a>
      </div>
    </div>
  </div>

  <main class="container py-4">
    <div id="alertaSoloAdmin"></div>

    <section id="seccionFormularioInventario" class="d-none">
      <div class="row justify-content-center">
        <div class="col-12 col-lg-10">
          <div class="card shadow-sm border-0" style="border-radius:18px;">
            <div class="card-body p-4">

              <div class="d-flex align-items-start gap-3 mb-3">
                <div class="rounded-circle d-flex align-items-center justify-content-center"
                     style="width:52px;height:52px;background:#A5D6A7;color:#1B5E20;">
                  💊
                </div>
                <div class="flex-grow-1">
                  <h1 class="h4 mb-1" id="tituloInventarioForm">Agregar Medicamento</h1>
                  <p class="text-muted mb-0" id="subtituloInventarioForm">Completa la informacion del item</p>
                </div>
              </div>

              <div id="alertaInventarioForm"></div>

              <form id="formInventario">
                <div class="row g-3">
                  <div class="col-12 col-md-6">
                    <label class="form-label" for="nombre">Medicamento</label>
                    <input class="form-control" id="nombre" placeholder="Ej Amoxicilina 500mg" />
                  </div>

                  <div class="col-12 col-md-3">
                    <label class="form-label" for="cantidad">Cantidad</label>
                    <input class="form-control" id="cantidad" type="number" min="0" placeholder="Ej 12" />
                  </div>

                  <div class="col-12 col-md-3">
                    <label class="form-label" for="estado">Estado</label>
                    <select class="form-select" id="estado">
                      <option value="Normal" selected>Stock Normal</option>
                      <option value="Bajo">Stock Bajo</option>
                      <option value="Critico">Stock Critico</option>
                    </select>
                  </div>

                  <div class="col-12 col-md-6">
                    <label class="form-label" for="vencimiento">Vencimiento</label>
                    <input class="form-control" id="vencimiento" type="date" />
                  </div>

                  <div class="col-12 col-md-6">
                    <label class="form-label" for="proveedor">Proveedor</label>
                    <input class="form-control" id="proveedor" placeholder="Ej FarmaVet S.A." />
                  </div>
                </div>

                <div class="row g-2 mt-4">
                  <div class="col-12 col-md-6">
                    <a class="btn btn-outline-secondary w-100" href="inventario.html">Cancelar</a>
                  </div>
                  <div class="col-12 col-md-6">
                    <button class="btn btn-success w-100" type="submit" id="btnGuardarInventario">
                      Guardar Item
                    </button>
                  </div>
                </div>
              </form>

            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <footer>
    <div class="footer">
      <p>SC502 - Proyecto Administracion Web Cliente Servidor</p>
      <p>&copy; 2026 Veterinaria Patitas Sistema de Gestion Veterinaria</p>
    </div>
  </footer>

  <script src="../js/inventario.js"></script>
</body>
</html>
