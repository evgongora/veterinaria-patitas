<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendar Cita - Veterinaria Patitas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/estilos.css">
</head>
<body>
    <div class="app-layout">
        <header class="app-header">
            <a href="panel.html" class="brand"><span class="paw">🐾</span><span>Veterinaria Patitas</span></a>
            <div class="user-area">
                <div class="user-info"><div class="name">Juan Pérez</div><div class="role">Cliente</div></div>
                <a href="login.html" class="btn-logout">→ Cerrar Sesión</a>
            </div>
        </header>
        <div class="app-body">
            <aside class="app-sidebar">
                <a href="panel.html" class="nav-item"><span class="icon">🏠</span> Dashboard</a>
                <a href="mascotas.html" class="nav-item"><span class="icon">🐾</span> Mis Animales</a>
                <a href="cita-formulario.html" class="nav-item active"><span class="icon">📅</span> Agendar Cita</a>
                <a href="historial-clinico.html" class="nav-item"><span class="icon">📋</span> Historial Clínico</a>
                <a href="facturas.html" class="nav-item"><span class="icon">🧾</span> Facturas</a>
            </aside>
            <main class="app-content">
                <div class="d-flex align-items-start gap-3 mb-4">
                    <div class="rounded-circle d-flex align-items-center justify-content-center flex-shrink-0" style="width:56px;height:56px;background:#1976D2;color:white;font-size:1.5rem;">📅</div>
                    <div>
                        <h1 class="h3 fw-bold mb-1">Agendar Cita</h1>
                        <p class="text-muted mb-0">Programa una consulta para tu mascota</p>
                    </div>
                </div>

                <div class="card border-0 shadow-sm">
                    <div class="card-body p-4">
                        <form id="formCita">
                            <div class="mb-4">
                                <label class="form-label">Selecciona el Animal <span class="text-danger">*</span></label>
                                <select id="animal" class="form-select" required>
                                    <option value="">-- Selecciona un animal --</option>
                                    <option value="max">Max - Labrador</option>
                                    <option value="luna">Luna - Siamés</option>
                                    <option value="rocky">Rocky - Pastor Alemán</option>
                                </select>
                            </div>
                            <div class="mb-4">
                                <label class="form-label">Veterinario <span class="text-danger">*</span></label>
                                <select id="veterinario" class="form-select" required>
                                    <option value="">-- Selecciona un veterinario --</option>
                                    <option value="maria">Dra. María González</option>
                                    <option value="carlos">Dr. Carlos Ramírez</option>
                                    <option value="ana">Dra. Ana Martínez</option>
                                </select>
                            </div>
                            <div class="mb-4">
                                <label class="form-label">Fecha <span class="text-danger">*</span></label>
                                <input type="text" id="fecha" class="form-control" placeholder="dd/mm/yyyy" required>
                            </div>
                            <div class="mb-4">
                                <label class="form-label">Horarios Disponibles <span class="text-danger">*</span></label>
                                <div class="d-flex flex-wrap gap-2" id="horarios">
                                    <label class="btn btn-light border horario-btn"><input type="radio" name="hora" value="09:00" class="d-none"> 09:00 AM</label>
                                    <label class="btn btn-light border horario-btn"><input type="radio" name="hora" value="10:00" class="d-none"> 10:00 AM</label>
                                    <label class="btn btn-light border horario-btn"><input type="radio" name="hora" value="11:00" class="d-none"> 11:00 AM</label>
                                    <label class="btn btn-light border horario-btn"><input type="radio" name="hora" value="12:00" class="d-none"> 12:00 PM</label>
                                    <label class="btn btn-light border horario-btn"><input type="radio" name="hora" value="14:00" class="d-none"> 02:00 PM</label>
                                    <label class="btn btn-light border horario-btn"><input type="radio" name="hora" value="15:00" class="d-none"> 03:00 PM</label>
                                    <label class="btn btn-light border horario-btn"><input type="radio" name="hora" value="16:00" class="d-none"> 04:00 PM</label>
                                    <label class="btn btn-light border horario-btn"><input type="radio" name="hora" value="17:00" class="d-none"> 05:00 PM</label>
                                </div>
                            </div>
                            <div class="mb-4">
                                <label class="form-label">Motivo de la Consulta <span class="text-danger">*</span></label>
                                <textarea id="motivo" class="form-control" rows="3" placeholder="Describe brevemente el motivo de la consulta..." required></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary btn-lg px-4">Confirmar Cita</button>
                        </form>
                    </div>
                </div>
            </main>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/citas.js"></script>
    <script>
        document.querySelectorAll('.horario-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.horario-btn').forEach(b => b.classList.remove('active', 'btn-primary'));
                this.classList.add('active', 'btn-primary');
                this.querySelector('input').checked = true;
            });
        });
        document.getElementById('formCita')?.addEventListener('submit', (e) => {
            e.preventDefault();
            if (!document.querySelector('input[name="hora"]:checked')) {
                alert('Selecciona un horario');
                return;
            }
            window.location.href = 'cita-confirmacion.html';
        });
    </script>
</body>
</html>
