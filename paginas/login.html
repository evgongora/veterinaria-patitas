<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Veterinaria Patitas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/estilos.css">
</head>
<body class="auth-page">
    <main class="auth-container">
        <section class="auth-card card shadow-lg">
            <div class="card-body p-4 p-md-5">
                <header class="auth-header mb-4">
                    <div class="logo-group d-flex align-items-center gap-2 mb-2">
                        <span class="auth-logo-icon" aria-hidden="true">🐾</span>
                        <h1 class="auth-title mb-0">Veterinaria Patitas</h1>
                    </div>
                    <p class="auth-subtitle text-muted mb-0">Inicia sesión en tu cuenta</p>
                </header>

                <div id="login-alert" class="alert alert-danger d-none" role="alert"></div>

                <aside class="alert alert-info py-3 mb-4" aria-label="Credenciales de demostración">
                    <small class="d-block mb-1"><strong>Demo - Admin:</strong> admin@patitas.com / 1234</small>
                    <small class="d-block mb-0"><strong>Demo - Cliente:</strong> cliente@patitas.com / 123456</small>
                </aside>

                <form id="login-form" novalidate>
                    <div class="form-group mb-3">
                        <label for="login-email" class="form-label">Correo Electrónico</label>
                        <input type="email" class="form-control" id="login-email" placeholder="tu@email.com" required>
                        <div id="login-email-error" class="invalid-feedback" role="alert"></div>
                    </div>
                    <div class="form-group mb-4">
                        <label for="login-password" class="form-label">Contraseña</label>
                        <input type="password" class="form-control" id="login-password" required>
                        <div id="login-password-error" class="invalid-feedback" role="alert"></div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-3 mb-3">
                        → Iniciar Sesión
                    </button>
                </form>

                <nav class="auth-links text-center" aria-label="Enlaces de autenticación">
                    <a href="#" class="d-block text-decoration-none text-secondary mb-2 small">¿Olvidaste tu contraseña?</a>
                    <p class="mb-2 small">
                        ¿No tienes cuenta?
                        <a href="registro.html" class="text-decoration-none fw-semibold">Crear cuenta</a>
                    </p>
                    <a href="../index.html" class="d-inline-flex align-items-center gap-1 text-secondary small">
                        ← Volver al inicio
                    </a>
                </nav>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/validaciones.js"></script>
    <script src="../js/autenticacion.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => Auth.initLogin());
    </script>
</body>
</html>
